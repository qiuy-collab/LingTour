<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Editorial placeholder">
  <defs>
    <pattern id="grain-sq" patternUnits="userSpaceOnUse" width="3" height="3">
      <rect width="3" height="3" fill="#e2ddd4" />
      <circle cx="0.5" cy="0.5" r="0.4" fill="#000" opacity="0.04" />
      <circle cx="2" cy="1.7" r="0.3" fill="#000" opacity="0.03" />
      <circle cx="1.2" cy="2.3" r="0.4" fill="#000" opacity="0.05" />
    </pattern>
    <linearGradient id="vignette-sq" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000" stop-opacity="0" />
      <stop offset="1" stop-color="#000" stop-opacity="0.06" />
    </linearGradient>
    <pattern id="ledger-sq" patternUnits="userSpaceOnUse" width="40" height="40">
      <path d="M0 39.5 H40" stroke="#3a3a3a" stroke-width="0.4" opacity="0.07" />
    </pattern>
  </defs>

  <rect width="800" height="800" fill="url(#grain-sq)" />
  <rect width="800" height="800" fill="url(#ledger-sq)" />
  <rect width="800" height="800" fill="url(#vignette-sq)" />

  <!-- registration crosses -->
  <g stroke="#1f1f1f" stroke-width="1" opacity="0.35">
    <line x1="34" y1="46" x2="34" y2="74" />
    <line x1="20" y1="60" x2="48" y2="60" />
    <line x1="766" y1="46" x2="766" y2="74" />
    <line x1="752" y1="60" x2="780" y2="60" />
    <line x1="34" y1="726" x2="34" y2="754" />
    <line x1="20" y1="740" x2="48" y2="740" />
    <line x1="766" y1="726" x2="766" y2="754" />
    <line x1="752" y1="740" x2="780" y2="740" />
  </g>

  <!-- top tape -->
  <g transform="translate(290, -16) rotate(-2)" opacity="0.55">
    <rect x="0" y="0" width="220" height="46" fill="#d6c8a8" />
    <rect x="0" y="0" width="220" height="46" fill="#000" opacity="0.04" />
  </g>

  <!-- center -->
  <g transform="translate(400, 360)" text-anchor="middle">
    <text x="0" y="-72" font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace" font-size="13" fill="#1f1f1f" opacity="0.55" letter-spacing="5">
      FIELD ARCHIVE
    </text>
    <text x="0" y="20" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="80" fill="#1f1f1f" opacity="0.92" letter-spacing="-1">
      Awaiting
    </text>
    <text x="0" y="100" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="80" fill="#1f1f1f" opacity="0.92" letter-spacing="-1">
      dispatch.
    </text>
  </g>

  <!-- bottom small print -->
  <g transform="translate(70, 720)">
    <text x="0" y="0" font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace" font-size="11" fill="#1f1f1f" opacity="0.55" letter-spacing="3">
      DRAFT · NOT FOR PRESS
    </text>
  </g>
  <g transform="translate(730, 720)" text-anchor="end">
    <text x="0" y="0" font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace" font-size="11" fill="#1f1f1f" opacity="0.55" letter-spacing="3">
      REF · LT-FA-SQ
    </text>
  </g>

  <!-- pending stamp -->
  <g transform="translate(540, 200) rotate(-8)" opacity="0.30">
    <rect x="0" y="0" width="180" height="54" fill="none" stroke="#9e2b21" stroke-width="2.5" />
    <rect x="5" y="5" width="170" height="44" fill="none" stroke="#9e2b21" stroke-width="0.8" />
    <text x="90" y="36" text-anchor="middle" font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace" font-size="18" fill="#9e2b21" letter-spacing="5">PENDING</text>
  </g>
</svg>
