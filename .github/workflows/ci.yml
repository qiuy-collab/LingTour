name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  api:
    name: API (type-check + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: lingtour_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit --skipLibCheck
      - run: npm test -- --passWithNoTests
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: lingtour_test
          DB_USER: test
          DB_PASSWORD: test
          JWT_SECRET: ci-test-secret
      - run: npm run build

  site:
    name: Site (type-check + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: site/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npx tsc --noEmit --skipLibCheck
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [api, site]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -t lingtour-api:${{ github.sha }} ./api
      - name: Build Site image
        run: docker build -t lingtour-site:${{ github.sha }} ./site
