version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-lingtour}
      POSTGRES_USER: ${DB_USERNAME:-lingtour}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-lingtour} -d ${DB_DATABASE:-lingtour}"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 8000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-lingtour}
      DB_USERNAME: ${DB_USERNAME:-lingtour}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-https://lingfengtranstour.cn/api/v1/auth/google/callback}
    volumes:
      - uploads:/app/uploads
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8000/health').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1));\""]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  site:
    build:
      context: .
      dockerfile: site/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1));\""]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  admin:
    build:
      context: .
      dockerfile: projects/proj-1778970788262-5mcldi/admin-frontend/Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4173
      HOST: 0.0.0.0
      VITE_API_ORIGIN: http://api:8000
    expose:
      - "4173"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4173').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1));\""]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - api
      - site
      - admin
    ports:
      - "8088:80"
    volumes:
      - ./nginx.docker.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads:/var/www/uploads:ro

volumes:
  pgdata:
  uploads:
